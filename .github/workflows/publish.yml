on: 
  push:
    branches: [main]
  # This tool encourages you to run it on pull requests to test the deployment process.
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # If your deploy script that you write needs to push a git commit, git tag, or create a GitHub Release.
      pull-requests: write # If you enable pull request comments (they are enabled by default).
    steps:
      - uses: actions/checkout@v5

      - uses: jdx/mise-action@v4
      
      - uses: levibostian/decaf@0.16.0
        env:
          # required to use 'gh' CLI in my step scripts. 
          GH_TOKEN: ${{ github.token }}      
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          get_latest_release_current_branch: decaf shebang https://github.com/levibostian/decaf-script-github-releases.git/shebang.sh@1.2.0 get
          get_next_release_version: deno task run
          deploy: |
            deno compile --output decaf-script-conventional-commits-x64-linux --target x86_64-unknown-linux-gnu script.ts
            deno compile --output decaf-script-conventional-commits-arm64-linux --target aarch64-unknown-linux-gnu script.ts
            deno compile --output decaf-script-conventional-commits-x64-macos --target x86_64-apple-darwin script.ts
            deno compile --output decaf-script-conventional-commits-arm64-macos --target aarch64-apple-darwin script.ts
            cp install.template install.sh
            chmod +x install.sh
            sed -i "s/PUT_VERSION_HERE/{{nextVersionName}}/" install.sh
            cat install.sh | grep VERSION
            decaf shebang https://github.com/levibostian/decaf-script-github-releases.git/shebang.sh@1.2.0 set-github-release-assets \
              decaf-script-conventional-commits-x64-linux \
              decaf-script-conventional-commits-arm64-linux \
              decaf-script-conventional-commits-x64-macos \
              decaf-script-conventional-commits-arm64-macos \
              install.sh
            decaf shebang https://github.com/levibostian/decaf-script-github-releases.git/shebang.sh@1.2.0 set
